<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập Quản Trị - VietShop</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #1a6b3a;
            --primary-dark: #114d29;
            --accent: #f0a500;
            --bg-body: #f8f9fa;
            --text-dark: #1a1a1a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Be Vietnam Pro', sans-serif; }

        body {
            background-color: var(--bg-body);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .login-container {
            background: #fff;
            width: 100%;
            max-width: 400px;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
        }

        .login-logo {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            color: var(--primary);
            text-decoration: none;
            margin-bottom: 8px;
            display: block;
        }
        .login-logo span { color: var(--accent); }

        .login-subtitle {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 32px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-dark);
            margin-bottom: 8px;
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-control:focus { border-color: var(--primary); }

        .btn-login {
            width: 100%;
            background-color: var(--primary);
            color: #fff;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
        }

        .btn-login:hover { background-color: var(--primary-dark); }

        .error-message {
            color: #ef4444;
            font-size: 13px;
            margin-top: 12px;
            display: none;
        }

        .demo-credentials {
            margin-top: 24px;
            background: var(--bg-body);
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            color: var(--text-muted);
        }
        .demo-credentials strong { color: var(--text-dark); }
    </style>
</head>
<body>

    <div class="login-container">
        <a href="vietshop-marketplace.html" class="login-logo">Việt<span>Shop</span></a>
        <div class="login-subtitle">Hệ Thống Quản Trị Trung Tâm</div>

        <form id="loginForm">
            <div class="form-group">
                <label>Tài khoản</label>
                <input type="text" id="username" class="form-control" placeholder="Nhập tài khoản admin..." required>
            </div>
            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" id="password" class="form-control" placeholder="Nhập mật khẩu..." required>
            </div>
            
            <button type="submit" class="btn-login">Đăng Nhập</button>
            <div id="errorMsg" class="error-message"><i class="fa-solid fa-circle-exclamation"></i> Tài khoản hoặc mật khẩu không đúng!</div>
        </form>

        <div class="demo-credentials">
            <strong>Tài khoản Demo:</strong><br>
            Tên đăng nhập: <strong>admin</strong><br>
            Mật khẩu: <strong>123456</strong>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            if (user === 'admin' && pass === '123456') {
                errorMsg.style.display = 'none';
                // Lưu trạng thái đăng nhập admin
                localStorage.setItem('isAdminLoggedIn', 'true');
                // Chuyển hướng tới trang quản trị
                window.location.href = 'admin.html';
            } else {
                errorMsg.style.display = 'block';
            }
        });
    </script>

</body>
</html>
